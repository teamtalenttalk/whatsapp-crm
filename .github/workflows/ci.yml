name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend - Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: Lint check
        run: npx --yes eslint src/ --ext .js --no-error-on-unmatched-pattern || true

      - name: Run tests
        run: npm test --if-present

      - name: Verify server starts
        run: |
          timeout 10 node src/index.js &
          sleep 3
          curl -sf http://localhost:8097/api/health || exit 1
          kill %1 || true

  frontend:
    name: Frontend - Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint --if-present || true

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t whatsapp-crm:ci .

      - name: Test Docker Compose
        run: |
          docker compose up -d backend
          sleep 5
          docker compose ps
          curl -sf http://localhost:3061/api/health || exit 1
          docker compose down
