version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: whatsapp-crm-backend
    ports:
      - "3061:3061"
    environment:
      - NODE_ENV=production
      - PORT=3061
      - JWT_SECRET=${JWT_SECRET:-wa-crm-secret-change-me}
      - FRONTEND_URL=http://frontend:3003
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      - backend-data:/app/backend/data
      - wa-sessions:/app/backend/wa-sessions
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3061/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: whatsapp-crm-frontend
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=production
      - PORT=3003
    command: ["npx", "next", "start", "-p", "3003"]
    working_dir: /app/frontend
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  backend-data:
    driver: local
  wa-sessions:
    driver: local
